<!DOCTYPE html>
<html>
<head>
    <title>EmoHeal Player</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .card {
            width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .btn {
            width: 180px;
            padding: 14px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .start {
            background: linear-gradient(45deg, #22c55e, #16a34a);
        }

        .stop {
            background: linear-gradient(45deg, #ef4444, #dc2626);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .status {
            margin-top: 25px;
            font-size: 18px;
            color: #38bdf8;
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="emoji">🎵</div>
    <h1>EmoHeal Emotion Player</h1>

    <button class="btn start" onclick="startCamera()">▶ Start Camera</button>
    <button class="btn stop" onclick="stopCamera()">■ Stop Camera</button>

    <div class="status" id="status">Status: Idle</div>
</div>

<script>
function startCamera(){
    document.getElementById("status").innerText = "Status: Starting...";
    fetch("http://127.0.0.1:5000/start")
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerText = "Status: Camera Running 🎥";
    })
    .catch(() => {
        document.getElementById("status").innerText = "Status: camera starting...in few seconds";
    });
}

function stopCamera(){
    document.getElementById("status").innerText = "Status: Stopped 🛑";
}
</script>

</body>
</html>
